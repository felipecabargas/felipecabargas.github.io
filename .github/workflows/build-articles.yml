name: Build Articles

on:
  push:
    branches: [master]
    paths:
      - '_articles/**'
      - 'scripts/build.js'
      - 'package.json'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build articles
        run: npm run build

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles/ index.html feed.xml
          git diff --cached --quiet || (git pull --rebase && git commit -m "build: regenerate articles from markdown [skip ci]" && git push)
